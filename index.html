<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MaglakbAI — Navigate Your Future. Isulong Ang Pangarap.</title>
    <meta name="description" content="Navigate Your Future. Isulong Ang Pangarap. Log real proof-of-work outputs, earn XP, unlock skill milestones, and grow in any skill, any field, any level." />

    <!-- PWA / iPhone install support -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7C3AED" />

    <!-- iOS Safari "Add to Home Screen" -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MaglakbAI" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- Open Graph — controls preview when link is shared on Slack, WhatsApp, LinkedIn, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MaglakbAI — Navigate Your Future. Isulong Ang Pangarap." />
    <meta property="og:description" content="Navigate Your Future. Isulong Ang Pangarap. Any skill. Any field. Any level. Log real outputs, earn XP, unlock milestones." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="MaglakbAI — Navigate Your Future. Isulong Ang Pangarap." />
    <meta name="twitter:description" content="Log real outputs, earn XP, unlock skill milestones. Any skill. Any field. Any level." />
    <meta name="twitter:image" content="/icon-512.png" />

    <!-- Prevent zoom on input focus (iOS) -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Premium product font (Plus Jakarta Sans) app-wide + Space Grotesk for the brand wordmark -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #080810; overflow-x: hidden; }
      /* User-adjustable text size — scales the whole app uniformly. The
         --app-font-scale variable is set from the store (Settings → Text Size);
         defaults to 1. */
      #root { zoom: var(--app-font-scale, 1); }
      /* Premium font app-wide. react-native-web pins a font-family on every Text
         element via an atomic class, so we need id-scoped !important to win.
         Emoji/icon glyphs fall back to the system emoji font automatically. */
      #root, #root * {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
      }
      /* The brand wordmark gets a distinctive display face. Same specificity as
         the rule above, declared after it, so source order wins. */
      #brand-wordmark, #brand-wordmark * {
        font-family: 'Space Grotesk', 'Plus Jakarta Sans', sans-serif !important;
      }
      #root {
        width: 100%;
        max-width: 430px;
        height: 100%;
        background: #080810;
        margin: 0 auto;
        position: relative;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/web-index.tsx"></script>
  </body>
</html>
