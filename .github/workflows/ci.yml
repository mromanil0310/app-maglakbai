name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Type-check, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: node node_modules/.bin/tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: Build (web/PWA)
        run: node node_modules/.bin/vite build --outDir dist
